services:
  frontend_fornecedor_service:
    build: .
    container_name: frontend_fornecedor_service
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5174:5173"
    environment:
      VITE_API_URL: http://localhost:3002
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - frontend_fornecedor_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  frontend_fornecedor_node_modules:
